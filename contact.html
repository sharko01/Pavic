<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="contact">
    <header id="header"></header>

    <div class="container-fluid w-100 vh-100 d-flex mt-5">
        <form class="contact_form rounded-4 p-3 mx-auto my-auto" id="form_submit">
            <h2 class="mb-3 text-center fw-bold">Veuillez remplir le formulaire</h2>
            <div class="row row-cols-2">
                <div class="col form-floating mb-3">
                    <input type="text" id="last-name" class="form-control" name="last" required>
                    <label for="last-name" class="ps-3" >Nom :</label>
                </div>
                <div class="col form-floating mb-3">
                    <input type="text" id="first-name" class="form-control" name="first" required>
                    <label for="first-name" class="ps-3" >Prénom :</label>
                </div>
            </div>
            <div class="row row-cols-2">
                <div class="form-floating mb-3">
                    <input type="tel" id="phone" class="form-control" name="phone" required>
                    <label for="phone" class="ps-3" >Telephone :</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="email" id="mail" class="form-control" name="email">
                    <label for="mail" class="ps-3" >E-mail :</label>
                </div>
            </div>
            <div class="form-floating mb-3">
                <textarea type="email" id="mail" class="form-control textarea" name="message"></textarea>
                <label for="mail" >Votre message :</label>
            </div>
            <div class="d-flex justify-content-center">
                <button class="btn btn-light px-sm-5" type="submit">Envoyer</button>
            </div>
    
        </form>
    </div>


    <br>
    <div class="container-fluid p-5" id="footer"></div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./scripts/include.js"></script>
    <script src="./scripts/contact.js"></script>
</body>
</html>
